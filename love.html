<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letters For You 💌</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .letter-page {
            background: white;
            width: 100%;
            max-width: 600px;
            min-height: 70vh;
            border-radius: 25px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15);
            padding: 4rem 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transform: translateX(100px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .letter-page.active {
            transform: translateX(0);
            opacity: 1;
        }
        
        .letter-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff6b9d, #ffd93d, #4ecdc4);
        }
        
        .page-number {
            position: absolute;
            top: 1rem;
            right: 2rem;
            background: rgba(255,107,157,0.1);
            color: #ff6b9d;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .letter-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #2c3e50;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .letter-message {
            font-size: 1.4rem;
            line-height: 1.8;
            color: #34495e;
            margin-bottom: 3rem;
            font-weight: 400;
        }
        
        .next-button {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff6b9d, #ff8e8e);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(255,107,157,0.4);
            transition: all 0.3s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .next-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 45px rgba(255,107,157,0.6);
        }
        
        .final-page {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }
        
        .final-title {
            font-size: 4rem !important;
            background: linear-gradient(45deg, #ff4757, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hearts-explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        .heart {
            position: absolute;
            font-size: 2rem;
            color: #ff6b9d;
            animation: explode 2s ease-out forwards;
        }
        
        @keyframes explode {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(1.3) rotate(180deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="hearts-explosion" id="heartsExplosion"></div>
    
    <div class="letter-container" id="letterContainer">
        <!-- PAGES WILL BE GENERATED BY JS -->
    </div>

    <script>
        const LETTERS = [
            {
                title: "Hey Beautiful 💕",
                message: "Every time I see your smile, my heart skips a beat. You've been carrying so much lately, but please know you're stronger than you realize. I'm here, always.",
                pageNum: 1
            },
            {
                title: "You're My Sunshine ☀️",
                message: "Even on your darkest days, you still manage to light up my world. Your laugh, your kindness, your everything... it's magic. Keep shining for me?",
                pageNum: 2
            },
            {
                title: "I See You 👀❤️",
                message: "I know you've been feeling down, but I see how hard you're trying. Every effort, every smile through tears... I'm so proud of you. You're incredible.",
                pageNum: 3
            },
            {
                title: "You're Never Alone 🫂",
                message: "When the world feels heavy, lean on me. Your struggles don't define you - your heart does. And your heart is pure gold. I'm right here.",
                pageNum: 4
            },
            {
                title: "My Safe Place 🏠",
                message: "You make me feel safe, loved, understood. Even when you're hurting, you still give so much love. Let me give it back to you now.",
                pageNum: 5
            },
            {
                title: "Forever Grateful 🙏",
                message: "Thank you for being you. For your late-night texts, your silly jokes, your warm hugs. Life is better with you in it. So much better.",
                pageNum: 6
            },
            {
                title: "You're Perfect 💎",
                message: "Your flaws? They're what make you perfect to me. Every scar, every worry line, every tear... they tell your beautiful story. I love every page.",
                pageNum: 7
            },
            {
                title: "My Heart's Home 🏡💖",
                message: "No matter where life takes us, you're my home. When you're sad, I'll hold you. When you smile, I'll celebrate. Always and forever.",
                pageNum: 8
            },
            {
                title: "The Final Letter 💌✨",
                message: "I LOVE YOU more than yesterday, less than tomorrow. You're my everything. Please smile for me? You've got this. I'm with you always. 😭💕",
                pageNum: "FINAL",
                isFinal: true
            }
        ];

        const container = document.getElementById('letterContainer');
        let currentPage = 0;

        // Create all letter pages
        LETTERS.forEach((letter, index) => {
            const page = document.createElement('div');
            page.className = 'letter-page';
            page.id = `page-${index}`;
            page.innerHTML = `
                <div class="page-number">Page ${letter.pageNum}</div>
                <h1 class="letter-title ${letter.isFinal ? 'final-title' : ''}">${letter.title}</h1>
                <p class="letter-message">${letter.message}</p>
                ${!letter.isFinal ? 
                    `<button class="next-button" onclick="nextPage(${index})">
                        Please click me again 💕
                    </button>` : 
                    `<button class="next-button" onclick="restartJourney()" style="background: linear-gradient(45deg, #4ecdc4, #44a08d);">
                        Read again? 🥰
                    </button>`
                }
            `;
            container.appendChild(page);
        });

        // Show first page
        showPage(0);

        function nextPage(index) {
            hideCurrentPage();
            setTimeout(() => {
                currentPage = index + 1;
                showPage(currentPage);
            }, 400);
        }

        function showPage(pageIndex) {
            const page = document.getElementById(`page-${pageIndex}`);
            page.classList.add('active');
            
            if (LETTERS[pageIndex].isFinal) {
                setTimeout(createHeartExplosion, 500);
            }
        }

        function hideCurrentPage() {
            const currentPageEl = document.querySelector('.letter-page.active');
            if (currentPageEl) {
                currentPageEl.classList.remove('active');
            }
        }

        function restartJourney() {
            currentPage = 0;
            hideCurrentPage();
            setTimeout(() => showPage(0), 400);
            document.getElementById('heartsExplosion').innerHTML = '';
        }

        function createHeartExplosion() {
            const explosion = document.getElementById('heartsExplosion');
            const hearts = ['💖', '💕', '💗', '💝', '✨', '🌟', '🥰'];
            
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.top = Math.random() * 100 + '%';
                    explosion.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 2000);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
